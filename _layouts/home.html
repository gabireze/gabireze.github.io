---
layout: default
---

<header>
  <h1 style="line-height: 2.5rem; margin-top: 1.5rem" id="title">
    {{ page.title }}
  </h1>
  {% if page.role %}
  <p class="home-role" style="font-weight: 600; margin: 0.35rem 0 0.5rem">
    {{ page.role }}
  </p>
  {% endif %}
  <p>{{ page.subtitle }}</p>
</header>

<main class="container home-content">
  {% include anchor_headings.html html=content anchorClass="anchor"
  anchorBody="#" anchorTitle="%heading%" beforeHeading=true %}
</main>
