# Título curto para fallbacks (og:site_name, páginas sem seo_title). Páginas principais usam seo_title no front matter.
title: Gabriel de Rezende Gonçalves
description: >
  Engenheiro de Software Full Stack: Angular, Vue.js, Laravel, Python (FastAPI), integrações e arquitetura de soluções. MBA em Arquitetura de Soluções (FIAP), com IA aplicada a produto e engenharia. Foco em performance, APIs e produtos escaláveis.
lang: pt-BR
timezone: America/Sao_Paulo
image: /assets/img/social-preview.png
mode: dark

url: "https://gabireze.com.br"
baseurl: "" # ajuste se estiver usando subpasta no GitHub Pages

permalink: /:title/

# SEO e redes sociais
author:
  name: Gabriel de Rezende Gonçalves
  bio: >
    Engenheiro de Software Full Stack | Angular, Vue.js, Laravel, Python | Arquitetura de soluções e integrações | MBA em Arquitetura de Soluções (FIAP)
  username: gabireze
  github: gabireze
  twitter: gabireze_
  facebook: gabireze
  linkedin: gabireze
  email: contato@gabireze.com.br
  avatar: /assets/img/user.png

# Google Analytics (GA4)
google_analytics: G-9K0SZYY1KR

# Meta extras otimizadas para SEO
keywords: Gabriel de Rezende Gonçalves, Software Engineer, Engenheiro de Software, Full Stack Developer, Angular, Vue.js, React, Laravel, Python FastAPI, Node.js, JavaScript, TypeScript, AWS, Azure, Cloud Computing, Microservices, API REST, PostgreSQL, MySQL, Docker, CI/CD, Agile, Scrum, FIAP, PUC Campinas
favicon_location: /assets/favicons/favicon.ico
default_lang: pt-BR

# Markdown e highlight
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Sass (CSS) com otimizações
sass:
  style: compressed
  sourcemap: never

# Plugins ativos
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

# Compressão de HTML melhorada
compress_html:
  clippings: all
  endings: all
  comments: ["<!-- ", " -->"]
  profile: false
  blanklines: false
  ignore:
    envs: ["development"]

# SEO melhorado
google_site_verification: # Adicione aqui se tiver
twitter:
  username: gabireze_
  card: summary_large_image

# Performance otimizations
liquid:
  error_mode: warn
  strict_filters: false
  strict_variables: false

# Build optimizations
incremental: true
safe: true
lsi: false
highlight: true

# Inclusões no build
include:
  - _redirects
  - .htaccess
  - .well-known

# Exclusões no build
exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - node_modules
  - klise.gemspec
